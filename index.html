<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US National Parks Explorer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface2:#fbfbf9;--surfoff:#f3f0ec;
  --border:rgba(40,37,29,0.12);--divider:#dcd9d5;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-h:#0c4e54;
  --shadow-sm:0 1px 3px rgba(40,37,29,0.08);
  --shadow-md:0 4px 16px rgba(40,37,29,0.12);
  --shadow-lg:0 12px 40px rgba(40,37,29,0.18);
  --radius:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--surfoff:#22211f;
  --border:rgba(205,204,202,0.1);--divider:#262523;
  --text:#cdccca;--muted:#797876;--faint:#5a5957;
  --primary:#4f98a3;--primary-h:#227f8b;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Work Sans',sans-serif;font-size:16px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;background:var(--surface);border-bottom:1px solid var(--divider);flex-shrink:0;z-index:10}
#header-left{display:flex;align-items:center;gap:0.75rem}
#logo{display:flex;align-items:center;gap:0.5rem}
#logo svg{width:28px;height:28px;color:var(--primary)}
#logo-text{font-family:'Instrument Serif',Georgia,serif;font-size:1.25rem;letter-spacing:-0.01em;color:var(--text)}
#park-count{font-size:0.75rem;color:var(--muted);padding:0.2rem 0.6rem;background:var(--surfoff);border-radius:999px;border:1px solid var(--border)}
#header-right{display:flex;align-items:center;gap:0.5rem}
#theme-toggle{width:36px;height:36px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surfoff);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 180ms ease}
#theme-toggle:hover{color:var(--text);background:var(--surface2)}
#body{display:flex;flex:1;overflow:hidden}

/* MAP */
#map-container{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}

/* HOVER CARD */
#hover-card{position:absolute;z-index:1001;pointer-events:none;opacity:0;transition:opacity 180ms ease;transform-origin:bottom center}
#hover-card img{width:220px;height:155px;object-fit:cover;border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:block}
#hover-card-label{background:var(--surface);padding:0.4rem 0.65rem;border-radius:0 0 var(--radius-lg) var(--radius-lg);font-size:0.75rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;border-top:1px solid var(--border)}
#hover-card-inner{box-shadow:var(--shadow-lg);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);background:var(--surface)}

/* SIDEBAR */
#sidebar{width:0;overflow:hidden;transition:width 300ms cubic-bezier(0.16,1,0.3,1);background:var(--surface);border-left:1px solid var(--divider);display:flex;flex-direction:column;flex-shrink:0}
#sidebar.open{width:380px}
#sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--divider);flex-shrink:0}
#sidebar-park-name{font-family:'Instrument Serif',Georgia,serif;font-size:1.35rem;line-height:1.2;color:var(--text);flex:1;min-width:0;padding-right:0.5rem}
#sidebar-state{font-size:0.7rem;color:var(--muted);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;margin-top:0.2rem}
#close-btn{width:32px;height:32px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surfoff);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 180ms ease}
#close-btn:hover{color:var(--text);background:var(--surface2)}
#sidebar-scroll{flex:1;overflow-y:auto;padding:1rem 1.25rem 2rem}
#sidebar-scroll::-webkit-scrollbar{width:4px}
#sidebar-scroll::-webkit-scrollbar-track{background:transparent}
#sidebar-scroll::-webkit-scrollbar-thumb{background:var(--divider);border-radius:2px}

/* SIDEBAR HERO */
.sb-hero{width:100%;height:160px;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:1rem;display:block;border:1px solid var(--border)}

/* SECTION */
.sb-section{margin-bottom:1.25rem}
.sb-section-title{font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--primary);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.4rem}
.sb-section-title svg{width:13px;height:13px;flex-shrink:0}

/* ATTRACTIONS */
.attraction{display:flex;gap:0.6rem;margin-bottom:0.65rem;align-items:flex-start}
.attraction-num{width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.attraction-body{}
.attraction-name{font-size:0.82rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:0.2rem}
.attraction-desc{font-size:0.75rem;color:var(--muted);line-height:1.5}
.attraction-img{width:100%;height:90px;object-fit:cover;border-radius:var(--radius);margin-top:0.4rem;border:1px solid var(--border)}

/* BEST TIME CHIP */
.time-chip{display:inline-flex;align-items:center;gap:0.35rem;background:color-mix(in srgb,var(--primary) 12%,var(--surfoff));color:var(--primary);border:1px solid color-mix(in srgb,var(--primary) 25%,var(--border));border-radius:999px;padding:0.25rem 0.7rem;font-size:0.72rem;font-weight:600;margin-bottom:0.5rem}
.time-tip{font-size:0.75rem;color:var(--muted);line-height:1.5}

/* FLIGHT CARD */
.flight-card{background:var(--surfoff);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0.85rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem 0.75rem}
.flight-field{}
.flight-label{font-size:0.64rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--faint);margin-bottom:0.15rem}
.flight-val{font-size:0.82rem;font-weight:600;color:var(--text)}
.flight-note{grid-column:1/-1;font-size:0.72rem;color:var(--muted);line-height:1.45;border-top:1px solid var(--border);padding-top:0.5rem;margin-top:0.1rem}

/* CUSTOM MARKER */
.park-marker{width:28px;height:36px;cursor:pointer}
.park-marker path.pin-body{transition:fill 150ms ease,filter 150ms ease}
.park-marker:hover path.pin-body{filter:brightness(1.2)}

/* LEAFLET OVERRIDES */
.leaflet-container{background:#1a1a1f}
[data-theme="light"] .leaflet-container{background:#e8e0d5}
.leaflet-tile-pane{filter:none}
[data-theme="dark"] .leaflet-tile-pane{filter:brightness(0.85) saturate(0.85)}

/* TOOLTIP */
.park-tooltip{background:var(--surface)!important;border:1px solid var(--border)!important;color:var(--text)!important;font-family:'Work Sans',sans-serif!important;font-size:0.72rem!important;font-weight:600!important;padding:0.3rem 0.55rem!important;border-radius:var(--radius)!important;box-shadow:var(--shadow-sm)!important;white-space:nowrap!important}
.leaflet-tooltip-top.park-tooltip::before{border-top-color:var(--border)!important}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="header-left">
      <div id="logo">
        <svg viewBox="0 0 28 28" fill="none" aria-label="National Parks Explorer logo">
          <path d="M14 3L3 22h22L14 3z" fill="currentColor" opacity="0.2"/>
          <path d="M14 3L3 22h22L14 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 22V15l5-5 5 5v7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="14" cy="9" r="1.5" fill="currentColor"/>
        </svg>
        <span id="logo-text">National Parks Explorer</span>
      </div>
      <span id="park-count">63 Parks</span>
    </div>
    <div id="header-right">
      <button id="theme-toggle" aria-label="Toggle theme" data-theme-toggle>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>
  <div id="body">
    <div id="map-container">
      <div id="map"></div>
      <div id="hover-card">
        <div id="hover-card-inner">
          <img id="hc-img" src="" alt="" width="220" height="155" loading="lazy">
          <div id="hc-label"></div>
        </div>
      </div>
    </div>
    <aside id="sidebar" aria-label="Park details">
      <div id="sidebar-header">
        <div>
          <div id="sidebar-park-name">—</div>
          <div id="sidebar-state"></div>
        </div>
        <button id="close-btn" aria-label="Close sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="sidebar-scroll">
        <img id="sb-hero" class="sb-hero" src="" alt="" width="330" height="160" loading="lazy">

        <div class="sb-section" id="sec-attractions">
          <div class="sb-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 0 0 .95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 0 0-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 0 0-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 0 0-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 0 0 .951-.69l1.519-4.674z"/></svg>
            3 Most Beautiful Things to See
          </div>
          <div id="attractions-list"></div>
        </div>

        <div class="sb-section" id="sec-timing">
          <div class="sb-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            Best Time to Visit
          </div>
          <div id="best-time-chip" class="time-chip"></div>
          <p id="best-time-tip" class="time-tip"></p>
        </div>

        <div class="sb-section" id="sec-flight">
          <div class="sb-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
            Flight from New York City
          </div>
          <div class="flight-card" id="flight-card"></div>
        </div>
      </div>
    </aside>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── PARKS DATA ──
const PARKS = [{"name": "Acadia", "state": "Maine", "lat": 44.35, "lng": -68.21, "img": "https://www.nps.gov/common/uploads/structured_data/3C7B477B-1DD8-B71B-0BCB48E009241BAA.jpg", "attractions": [{"name": "Cadillac Mountain Sunrise", "desc": "First light in the US — rise before dawn to watch the sunrise from the summit of Cadillac Mountain (1,530 ft) and be among the first people in the country to see the sun.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B4BEC-1DD8-B71B-0B2CF833F93140FF.jpg"}, {"name": "Jordan Pond & The Bubbles Hike", "desc": "Hike the iconic Jordan Pond Loop with emerald waters reflecting twin glacially-carved mountains. Stop at the Jordan Pond House for famous popovers with jam.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B45AE-1DD8-B71B-0B7EE131C7DFC2F5.jpg"}, {"name": "Thunder Hole at Mid-Tide", "desc": "Watch the Atlantic surge into a narrow chasm, detonating with thunderous booms and sea spray up to 40 feet high — most dramatic at mid-incoming tide.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B48F9-1DD8-B71B-0BD3B413E58978F8.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "September and October offer brilliant fall foliage, fewer crowds, and clear skies. The park is magical in early June before school lets out.", "nearestCity": "Bar Harbor, ME (BGR)", "flightTime": "~1.5–2h", "flightCost": "$180–350", "flightNote": "Fly into Bangor (BGR) or Portland (PWM), ~1h drive to park. Direct Portland flights from NYC year-round."}, {"name": "Arches", "state": "Utah", "lat": 38.68, "lng": -109.57, "img": "https://www.nps.gov/common/uploads/structured_data/473F5463-F0D2-261D-CEF5FCB39363590B.jpg", "attractions": [{"name": "Delicate Arch — Utah's Icon", "desc": "The 2-mile round-trip hike to the most recognizable arch in America rewards with a stunning freestanding sandstone arch 65 feet tall against the La Sal Mountains.", "img": "https://www.nps.gov/common/uploads/structured_data/3C79931C-1DD8-B71B-0BF201E3DB540D04.jpg"}, {"name": "Landscape Arch — Longest on Earth", "desc": "A 1.6-mile flat trail leads to the world's longest known natural arch — 306 feet of razor-thin sandstone so delicate it visibly sags under its own weight.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A0B2B-1DD8-B71B-0BE0E26B0740AA6B.jpg"}, {"name": "Windows Section & Double Arch", "desc": "Two giant arches form natural picture frames for sunrise — hike the easy 1-mile loop and shoot through North Window with the La Sal Mountains on the horizon.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A0C49-1DD8-B71B-0B460D58D6E83B40.jpg"}], "bestTime": "Mar – May, Sep – Nov", "bestTimeTip": "Summer temperatures exceed 100°F and the park requires timed entry permits. Spring wildflowers and fall colors are spectacular.", "nearestCity": "Moab, UT (CNY)", "flightTime": "~5–6h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly to Grand Junction (GJT) CO ~1.5h drive, or Salt Lake City (SLC) ~3.5h drive."}, {"name": "Badlands", "state": "South Dakota", "lat": 43.75, "lng": -102.5, "img": "https://www.nps.gov/common/uploads/structured_data/3C82EE63-1DD8-B71B-0BD6EE0FDCB5D402.jpg", "attractions": [{"name": "Notch Trail & Cliff Shelf Overlook", "desc": "A dramatic hike through a canyon and up a log ladder to a clifftop overlook with otherworldly eroded spires and pinnacles.", "img": "https://www.nps.gov/common/uploads/structured_data/3C82ED5D-1DD8-B71B-0B2F33D3B39D6D1B.jpg"}, {"name": "Bison & Bighorn Sheep Wildlife Viewing", "desc": "One of the best places in America to see free-roaming bison herds from the road — along with bighorn sheep, pronghorn, and prairie dogs.", "img": "https://www.nps.gov/common/uploads/structured_data/3C82EBFE-1DD8-B71B-0B21072718DB2A95.jpg"}, {"name": "Fossil Discovery Exhibit", "desc": "One of the world's richest Oligocene fossil beds — see sabertooth cat, three-toed horse, and titanothere specimens from 23–35 million years ago.", "img": "https://www.nps.gov/common/uploads/structured_data/28C2C88B-9904-7962-E60BEFC763604963.jpg"}], "bestTime": "Apr – Jun, Sep – Oct", "bestTimeTip": "Spring brings wildflowers and new bison calves. Fall is golden and uncrowded.", "nearestCity": "Rapid City, SD (RAP)", "flightTime": "~4–5h (1 stop)", "flightCost": "$200–450", "flightNote": "Direct flights from NYC to Rapid City (RAP) available some days. Park is ~1h drive west."}, {"name": "Big Bend", "state": "Texas", "lat": 29.25, "lng": -103.25, "img": "https://www.nps.gov/common/uploads/structured_data/8BF8356B-BB63-76A4-19F5296EF94C96B4.jpg", "attractions": [{"name": "Santa Elena Canyon River Float", "desc": "Float the Rio Grande through 1,500-foot sheer limestone walls — an awe-inspiring slot canyon accessible by canoe or kayak in remote Texas wilderness.", "img": "https://www.nps.gov/common/uploads/structured_data/8BCD073D-D2AF-C63C-F75A21DF9E355C61.jpg"}, {"name": "Lost Mine Trail Views", "desc": "A 4.8-mile round-trip hike through mountain forest to a rocky summit with 360° panoramas of the Chisos Mountains and vast desert stretching into Mexico.", "img": "https://www.nps.gov/common/uploads/structured_data/8BA1EB23-E950-8F6E-62C7523D37E42564.jpg"}, {"name": "Boquillas del Carmen Border Crossing", "desc": "Row a small boat across the Rio Grande into Mexico and visit a tiny village for authentic burritos and music — one of the most unique border experiences in the US.", "img": "https://www.nps.gov/common/uploads/structured_data/8BDD8415-B290-DEF8-105D75C840EBFCD2.jpg"}], "bestTime": "Nov – Mar", "bestTimeTip": "Summer temperatures reach 115°F. November–March is prime season with pleasant highs of 60–75°F. Stargazing is world-class.", "nearestCity": "Midland, TX (MAF)", "flightTime": "~4–5h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly into Midland (MAF) or El Paso (ELP), both ~3–4h drive to park. Rental car required."}, {"name": "Biscayne", "state": "Florida", "lat": 25.65, "lng": -80.08, "img": "https://www.nps.gov/common/uploads/structured_data/3C8717A4-1DD8-B71B-0B2EED68CFA7E008.jpg", "attractions": [{"name": "Glass-Bottom Boat Tour Over the Reef", "desc": "95% of the park is underwater — a glass-bottom boat tour reveals vibrant coral reefs in the northernmost living reef in the continental US.", "img": "https://www.nps.gov/common/uploads/structured_data/3C870533-1DD8-B71B-0B70CFF5EF6538F1.jpg"}, {"name": "Adams Key & Elliot Key Camping", "desc": "Kayak or take the park ferry to remote barrier islands for primitive camping under a canopy of tropical hardwood hammock — completely off-grid.", "img": "https://www.nps.gov/common/uploads/structured_data/E789390E-C7B5-2B1F-13974FC0EA9C7BD6.jpg"}, {"name": "Snorkeling the Maritime Heritage Trail", "desc": "Snorkel over six historic shipwrecks in crystal-clear shallow water — the park's underwater trail includes vessels from the 1870s to 1966.", "img": "https://www.nps.gov/common/uploads/structured_data/3C870833-1DD8-B71B-0BE93D49E0DF6503.jpg"}], "bestTime": "Dec – Apr", "bestTimeTip": "Avoid hurricane season (June–November). Winter and spring offer calm waters and 100+ feet of underwater visibility.", "nearestCity": "Miami, FL (MIA)", "flightTime": "~3h (direct)", "flightCost": "$120–300", "flightNote": "Many direct NYC to Miami flights. Park is ~25 miles south of Miami — accessible by boat only."}, {"name": "Black Canyon of the Gunnison", "state": "Colorado", "lat": 38.57, "lng": -107.72, "img": "https://www.nps.gov/common/uploads/structured_data/3C81655F-1DD8-B71B-0B4BCFFDB74EE723.jpg", "attractions": [{"name": "Gunnison Point & Chasm View", "desc": "Stand at the rim and peer 2,000 feet straight down — walls so close that sunlight reaches the bottom for only 33 minutes daily.", "img": "https://www.nps.gov/common/uploads/structured_data/3C8166E8-1DD8-B71B-0BDEB9A4EEEED807.jpg"}, {"name": "Painted Wall — Colorado's Tallest Cliff", "desc": "At 2,250 feet, Colorado's tallest cliff face is veined with pink pegmatite intrusions on 1.7-billion-year-old dark Precambrian gneiss.", "img": "https://www.nps.gov/common/uploads/structured_data/3C81655F-1DD8-B71B-0B4BCFFDB74EE723.jpg"}, {"name": "Inner Canyon Hike to the River", "desc": "Descend the extremely steep Warner Route into the canyon to the Gunnison River — one of the most rugged canyon descents in any US national park.", "img": "https://www.nps.gov/common/uploads/structured_data/3C8166E8-1DD8-B71B-0BDEB9A4EEEED807.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "South Rim road is open year-round; North Rim closes in winter. Late May and September offer pleasant temperatures.", "nearestCity": "Grand Junction, CO (GJT)", "flightTime": "~4–5h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to Denver (DEN) then drive ~4h, or Grand Junction (GJT) ~1.5h drive."}, {"name": "Bryce Canyon", "state": "Utah", "lat": 37.57, "lng": -112.18, "img": "https://www.nps.gov/common/uploads/structured_data/61F08520-E14F-18F2-BF5F3D89482631BD.jpg", "attractions": [{"name": "Sunrise & Sunset Points at Dawn", "desc": "Watch first light hit thousands of orange and red hoodoos — the most magical moment in the park as the amphitheater ignites in color.", "img": "https://www.nps.gov/common/uploads/structured_data/600067EF-E1B2-18B1-6120394EC23521DB.jpg"}, {"name": "Navajo Loop & Queens Garden Trail", "desc": "Descend into the amphitheater through narrow Wall Street slot canyon, past Thor's Hammer, and among hoodoos towering 200 feet above.", "img": "https://www.nps.gov/common/uploads/structured_data/613FFA94-B2F5-FBBF-090B96462B7CAB18.jpg"}, {"name": "Stargazing — Gold Tier Dark Sky Park", "desc": "One of the darkest skies in the lower 48 — astronomy rangers lead nightly programs and 7,500 stars are visible to the naked eye.", "img": "https://www.nps.gov/common/uploads/structured_data/60400EC2-B3DA-DAD5-18BF97EA3403B692.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "Snow dusts the hoodoos in winter for stunning photography. September is idea h rare cave pearls and delicate helictites.", "img": "https://www.nps.gov/common/uploads/structured_data/2B40AD3D-DDDB-2F2E-1CB524F96FF08C4B.jpg"}], "bestTime": "Sep – Oct", "bestTimeTip": "Bat exodus viewing is best Aug–Oct. The cave maintains 56°F year-round, making it pleasant any season.", "nearestCity": "El Paso, TX (ELP)", "flightTime": "~4h (1 stop)", "flightCost": "$200–420", "flightNote": "Fly to El Paso (ELP) or Midland (MAF), both ~2–3h drive."}, {"name": "Channel Islands", "state": "California", "lat": 34.01, "lng": -119.42, "img": "https://www.nps.gov/common/uploads/structured_data/8DE774D1-CB22-37F2-D826E3F0A73D303A.jpg", "attractions": [{"name": "Sea Caves of Santa Cruz Island", "desc": "Sea kayak into Painted Cave — the world's largest sea cave, 1,215 feet deep with vaulted 100-foot ceilings lit by phosphorescent plankton at high tide.", "img": "https://www.nps.gov/common/uploads/structured_data/8E0CA65D-0CF8-87C6-DE4B4AA7AAC02DEA.jpg"}, {"name": "Island Fox — Endemic Wildlife", "desc": "Spot the miniature island fox (found nowhere else on Earth) up close — it evolved in complete isolation over 10,000 years on these remote islands.", "img": "https://www.nps.gov/common/uploads/structured_data/8DF30150-D91A-D761-4A5064BA77154E2C.jpg"}, {"name": "Anacapa Island Lighthouse & Tidepools", "desc": "Dramatic arch rock formations, California brown pelican rookeries, and some of the most accessible tidepools in Southern California.", "img": "https://www.nps.gov/common/uploads/structured_data/8E1AE30B-DBDB-C193-C1023F2C7591ABA0.jpg"}], "bestTime": "Apr – Nov", "bestTimeTip": "May–July offers prime whale watching and calm seas. Summer and fall are best for kayaking and snorkeling.", "nearestCity": "Los Angeles, CA (LAX)", "flightTime": "~5.5h (direct)", "flightCost": "$150–350", "flightNote": "Fly into LAX. Ferries depart from Ventura or Oxnard harbors. Advance boat reservations required."}, {"name": "Congaree", "state": "South Carolina", "lat": 33.78, "lng": -8 ke a boat to Wizard Island — a cinder cone volcano rising from the center of the lake — and hike to the summit crater for 360° views of the caldera.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B2524-1DD8-B71B-0B84C60FF964D102.jpg"}, {"name": "Cleetwood Cove Trail & Lake Swimming", "desc": "The only trail to the water's edge — swim in ultra-clear water with visibility to 100+ feet, one of the purest lakes on Earth.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B26D3-1DD8-B71B-0B939039D597B9A3.jpg"}], "bestTime": "Jul – Sep", "bestTimeTip": "Heavy snowpack closes Rim Drive until late June or July. September offers fewer crowds and stunning reflections.", "nearestCity": "Medford, OR (MFR)", "flightTime": "~6h (1 stop)", "flightCost": "$250–550", "flightNote": "Fly to Medford (MFR) ~1.5h drive, or Eugene (EUG) ~2.5h drive. Both require connections from NYC."}, {"name": "Cuyahoga Valley", "state": "Ohio", "lat": 41.24, "lng": -81.55, "img": "https://www.nps.gov/common/uploads/structured_data/F7425874-D97F-BFD6-36581A36C8A7FF0D.jpg", "attractions": [{"name": "Brandywine Falls", "desc": "A magnificent 65-foot waterfall cascading over ancient shale ledges — one of the most photographed sites in Ohio, accessible via a short boardwalk.", "img": "https://www.nps.gov/common/uploads/structured_data/F78A31A2-D7AD-F384-BEFACB28E45B7608.jpg"}, {"name": "Cuyahoga Valley Scenic Railroad", "desc": "Board a historic scenic train through fall foliage, past farms, forests, and along the Ohio & Erie Canal Towpath — a rare national park train experience.", "img": "https://www.nps.gov/common/uploads/structured_data/F7E15C5E-AF19-2C8B-7BC519C9BBDB06CC.jpg"}, {"name": "Ledges Trail Rock Formations", "desc": "Hike through a labyrinth of Sharon conglomerate rock ledges — 300-million-year-old formations creating sheltered overhangs and hemlock-shaded gorges.", "img": "https://www.nps.gov/common/uploads/structured_data/F82FA0CD-D84B-D131-1A778346760D24FB.jpg"  "Denali Summit Views (20,310 ft)", "desc": "North America's tallest peak towers over the Alaska Range in breathtaking isolation — visible from 200+ miles away on cloudless mornings.", "img": "https://www.nps.gov/common/uploads/structured_data/3C83C9C7-1DD8-B71B-0B9B669ED961F97E.jpg"}, {"name": "Kantishna Wildlife Tour Bus", "desc": "Spend a full day on the 92-mile park road spotting grizzly bears, wolves, moose, Dall sheep, and caribou with no crowds.", "img": "https://www.nps.gov/common/uploads/structured_data/FC6D4E23-02EE-B80D-09D9ECF7C334566E.jpg"}, {"name": "Wonder Lake Reflection at Dawn", "desc": "Tundra carpeted in cottongrass and dwarf fireweed frames the perfect mirrored reflection of Denali at Wonder Lake on cloudless mornings.", "img": "https://www.nps.gov/common/uploads/structured_data/3C83CB1A-1DD8-B71B-0BBB071EB28A90FD.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "Mid-June offers the best balance of wildlife activity, wildflowers, and nearly 20 hours of daylight. September adds brilliant fall tundra colors.", "nearestCity": "Fairbanks, AK (FAI)", "flightTime": "~9h (1 stop)", "flightCost": "$450–900", "flightNote": "Fly to Anchorage (ANC) then train or drive ~4h to park entrance."}, {"name": "Dry Tortugas", "state": "Florida", "lat": 24.63, "lng": -82.87, "img": "https://www.nps.gov/common/uploads/structured_data/3C81050F-1DD8-B71B-0B45EDC68B621860.jpg", "attractions": [{"name": "Fort Jefferson Moat Snorkeling", "desc": "Snorkel the crystal-clear moat around the massive 19th-century Civil War fort — walls teeming with coral, sea turtles, stingrays, and Caribbean reef fish.", "img": "https://www.nps.gov/common/uploads/structured_data/3C80FF02-1DD8-B71B-0B39AC51BF7B2FA2.jpg"}, {"name": "Primitive Camping Under the Stars", "desc": "Only 10 primitive campsites exist — spend a night with no light pollution, falling asleep to waves crashing on coral and waking to sea turtles on the beach.", "img": "https://www.nps.gov/common/uploads/structured_data/3C81
