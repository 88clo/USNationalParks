estCity": "Miami, FL (MIA)", "flightTime": "~3h (direct)", "flightCost": "$120–300", "flightNote": "Many direct NYC to Miami flights. Park entrance is ~1h drive southwest of Miami."}, {"name": "Gates of the Arctic", "state": "Alaska", "lat": 67.77, "lng": -153.3, "img": "https://www.nps.gov/common/uploads/structured_data/3C7A8B6B-1DD8-B71B-0B8B89FE0C6B6F4F.jpg", "attractions": [{"name": "Frigid Crags & Boreal Mountain", "desc": "The twin peaks Robert Marshall named 'the Gates of the Arctic' guard the entrance to a wilderness larger than Switzerland — no roads or trails exist.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A89F4-1DD8-B71B-0B52204A2EBF61A4.jpg"}, {"name": "Kobuk River Float Trip", "desc": "Float the Kobuk River through an Arctic valley with no trails, no roads, and almost no visitors — passing caribou migration corridors and ancient permafrost.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A8CFC-1DD8-B71B-0BF455202A395DA6.jpg"}, {"name": "Aurora Borealis & Midnight Sun", "desc": "Experience Arctic extremes — 24 hours of summer daylight and winter nights ablaze with the Northern Lights dancing over nameless peaks.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A8E6D-1DD8-B71B-0B34C967D29F5940.jpg"}], "bestTime": "Jun – Aug", "bestTimeTip": "No roads, trails, or visitor facilities. Access by bush plane from Coldfoot only. Budget $1,500+ for access. True wilderness expedition territory.", "nearestCity": "Fairbanks, AK (FAI)", "flightTime": "~9h (1 stop)", "flightCost": "$450–900", "flightNote": "Fly to Fairbanks (FAI) then charter a bush plane ($600–1,200 roundtrip)."}, {"name": "Gateway Arch", "state": "Missouri", "lat": 38.62, "lng": -90.19, "img": "https://www.nps.gov/common/uploads/structured_data/200BA7E6-D782-9A97-A8C36AC178DEB31C.jpg", "attractions": [{"name": "Tram Ride to the Arch Summit", "desc": "Ride a small capsule tram to the top of the 630-foot stainless steel arch — America's tallest monument — for a panoramic view of St. Louis and the Mississippi River.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7BE538-1DD8-B71B-0BFF11B2DBCF6E6E.jpg"}, {"name": "Museum of Westward Expansion", "desc": "An immersive underground museum beneath the arch tells the story of Lewis & Clark, Native American life, and the pioneers of America's westward expansion.", "img": "https://www.nps.gov/common/uploads/structured_data/348E44EA-F431-FA18-DCB014F7BAA8D225.jpg"}, {"name": "Riverboat Cruise on the Mississippi", "desc": "Hop aboard a replica 19th-century riverboat for a narrated cruise on the Mississippi — a perspective of the city from the great river that built it.", "img": "https://www.nps.gov/common/uploads/structured_data/34E649C6-F06F-EB7F-0F9B8B092450772F.jpg"}], "bestTime": "Apr – Oct", "bestTimeTip": "The arch is beautiful year-round. Tram tickets sell out in summer — buy online in advance.", "nearestCity": "St. Louis, MO (STL)", "flightTime": "~2.5h (direct)", "flightCost": "$120–300", "flightNote": "Many direct NYC to St. Louis (STL) flights. The arch is in downtown St. Louis — no rental car needed."}, {"name": "Glacier", "state": "Montana", "lat": 48.7, "lng": -113.72, "img": "https://www.nps.gov/common/uploads/structured_data/C20E6CD3-CDF7-B3AB-8448CDCD7FD590FF.jpg", "attractions": [{"name": "Going-to-the-Sun Road Drive", "desc": "America's most dramatic mountain road crests the Continental Divide at Logan Pass — 50 miles of switchbacks, hanging valleys, waterfalls, and mountain goats.", "img": "https://www.nps.gov/common/uploads/structured_data/C19B20BB-C8CC-5BAB-22E3CA6AF9B2B67C.jpg"}, {"name": "Hidden Lake Overlook Trail", "desc": "A 2.7-mile round-trip from Logan Pass through wildflower meadows and snowfields to a dramatic overlook where mountain goats feed feet from the trail.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7FF648-1DD8-B71B-0B074AA63C93947A.jpg"}, {"name": "Two Medicine Valley", "desc": "The park's most underrated area — a pristine valley with a turquoise lake, dramatic peaks, and far fewer visitors than the popular western side.", "img": "https://www.nps.gov/common/uploads/structured_data/656FC997-DD74-8921-C68040FE1A2CA8D2.jpg"}], "bestTime": "Jul – Sep", "bestTimeTip": "Going-to-the-Sun Road fully opens in late June. Vehicle reservations required July–Sept. Bears, wildflowers, and mountain goats are most active in late summer.", "nearestCity": "Kalispell, MT (FCA)", "flightTime": "~6h (1 stop)", "flightCost": "$300–650", "flightNote": "Fly to Kalispell (FCA) ~30 min drive, or Missoula (MSO) ~2h drive. Connections required from NYC."}, {"name": "Glacier Bay", "state": "Alaska", "lat": 58.66, "lng": -136.9, "img": "https://www.nps.gov/common/uploads/structured_data/3C791618-1DD8-B71B-0B113FBF2EC1D614.jpg", "attractions": [{"name": "Johns Hopkins Glacier Cruise", "desc": "Navigate a massive floating ice field to the face of Johns Hopkins Glacier — harbor seals pup on ice floes, mountain goats cling to cliffsides, and calving ice fills the bay.", "img": "https://www.nps.gov/common/uploads/structured_data/3C790BBF-1DD8-B71B-0B0AE92D0B9C24EB.jpg"}, {"name": "Margerie Glacier Up-Close Viewing", "desc": "Cruise to the face of the 21-mile-long Margerie Glacier as chunks of blue ice the size of buildings calve into the bay with thunderous cracks.", "img": "https://www.nps.gov/common/uploads/structured_data/3C790D9C-1DD8-B71B-0B4327321DED12AE.jpg"}, {"name": "Bartlett Cove Rainforest Trail", "desc": "Walk through a temperate rainforest that didn't exist 200 years ago — the area was under a glacier until 1750, one of Earth's most remarkable ecological recoveries.", "img": "https://www.nps.gov/common/uploads/structured_data/3C790F92-1DD8-B71B-0BDF3774E82CB555.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "Accessible only by boat or plane — most visitors arrive on cruise ships or from Juneau by floatplane.", "nearestCity": "Juneau, AK (JNU)", "flightTime": "~8h (1–2 stops)", "flightCost": "$400–800", "flightNote": "Fly to Juneau (JNU) — 2 connections from NYC. Then floatplane ($300–400) or catamaran (~4h) to the park."}, {"name": "Grand Canyon", "state": "Arizona", "lat": 36.06, "lng": -112.14, "img": "https://www.nps.gov/common/uploads/structured_data/3C7B12D1-1DD8-B71B-0BCE0712F9CEA155.jpg", "attractions": [{"name": "South Rim Sunrise at Mather Point", "desc": "Watch dawn flood 277 miles of canyon with orange, red, and purple light — the canyon's immense scale becomes fully visible as shadows retreat from its billion-year-old walls.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B15A4-1DD8-B71B-0BFADECB506765CC.jpg"}, {"name": "Bright Angel Trail into the Gorge", "desc": "Descend through 2 billion years of Earth's geological history on America's most iconic rim-to-river trail — each switchback reveals a new layer of ancient rock.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B1720-1DD8-B71B-0B74DCF6F887A960.jpg"}, {"name": "Colorado River Rafting — Phantom Ranch", "desc": "Float multi-day whitewater rapids and stay at Phantom Ranch — the only lodging below the rim, accessible only by foot, mule, or raft. Books out a year ahead.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B12D1-1DD8-B71B-0BCE0712F9CEA155.jpg"}], "bestTime": "Mar – May, Sep – Nov", "bestTimeTip": "Summer (June–Aug) is brutally hot in the inner canyon (115°F+). Spring and fall offer perfect temperatures.", "nearestCity": "Flagstaff, AZ (FLG)", "flightTime": "~5h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to Phoenix (PHX) ~3.5h drive or Flagstaff (FLG) ~1.5h drive. Shuttle services from Flagstaff to the South Rim."}, {"name": "Grand Teton", "state": "Wyoming", "lat": 43.73, "lng": -110.8, "img": "https://www.nps.gov/common/uploads/structured_data/3C7FA4C5-1DD8-B71B-0B7FCC54E43FEE79.jpg", "attractions": [{"name": "Oxbow Bend Wildlife Sunrise", "desc": "The jagged Teton Range perfectly mirrored in the still Snake River at dawn, with moose wading nearby — one of the most photographed mountain reflections in America.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7FA7B7-1DD8-B71B-0B7B45B73D1C90C3.jpg"}, {"name": "Jenny Lake & Cascade Canyon Hike", "desc": "Take a shuttle boat across Jenny Lake and hike into Cascade Canyon — a pristine glacial valley with waterfalls, pikas, and black bears.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7FA923-1DD8-B71B-0B30EAF26172B37E.jpg"}, {"name": "Snake River Float & Wildlife Safari", "desc": "Drift down the Snake River at dawn past moose knee-deep in water, bald eagles scanning the current, and the entire Teton Range reflected below.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7FAC1D-1DD8-B71B-0B1A9E05DFA2AD10.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "July and August are peak season — book lodging 6–12 months ahead. September is spectacular with elk bugling and golden aspens.", "nearestCity": "Jackson Hole, WY (JAC)", "flightTime": "~6h (1 stop)", "flightCost": "$350–700", "flightNote": "Direct flights NYC to Jackson (JAC) available in summer and ski season."}, {"name": "Great Basin", "state": "Nevada", "lat": 38.98, "lng": -114.3, "img": "https://www.nps.gov/common/uploads/structured_data/FD29737E-9549-8EF4-90C1076486DE559A.jpeg", "attractions": [{"name": "Wheeler Peak & Alpine Lakes", "desc": "Drive to 10,000 feet and hike to alpine lakes beneath a 13,063-foot summit — one of Nevada's most dramatic high-alpine landscapes, almost never crowded.", "img": "https://www.nps.gov/common/uploads/structured_data/5F04461D-A4FD-8285-D2F63B264237D90C.jpg"}, {"name": "Lehman Caves Shield Formations", "desc": "Explore one of the most decorated caves in the West — hundreds of rare shield formations among the finest examples in any US cave system.", "img": "https://www.nps.gov/common/uploads/structured_data/7B7499DC-0524-6350-FEE17484562DE778.jpg"}, {"name": "Bristlecone Pine Forest", "desc": "Walk among the oldest living things on Earth — Great Basin bristlecone pines over 5,000 years old, twisted by centuries of harsh alpine wind and ice.", "img": "https://www.nps.gov/common/uploads/structured_data/54B2591D-BE7F-C50A-A1C069132CD3FA1C.jpg"}], "bestTime": "Jun – Oct", "bestTimeTip": "Fewer than 130,000 visitors per year — one of the least visited parks. Summer evenings offer some of the darkest skies in the lower 48.", "nearestCity": "Salt Lake City, UT (SLC)", "flightTime": "~5h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to Salt Lake City (SLC) then drive ~4h, or Las Vegas (LAS) then drive ~5h."}, {"name": "Great Sand Dunes", "state": "Colorado", "lat": 37.73, "lng": -105.51, "img": "https://www.nps.gov/common/uploads/structured_data/BC4ACB4C-0A6D-0188-E9A6AA1217827461.jpg", "attractions": [{"name": "Star Dune — Tallest Dune in North America", "desc": "Climb 750 feet of soft sand to the summit of North America's tallest dune — the Rockies visible in every direction, and the descent a tumbling adventure.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7CE6BD-1DD8-B71B-0B572A2B7842A510.jpg"}, {"name": "Medano Creek Wading & Sand Sleds", "desc": "In late May and June, a seasonal creek surges at the dune base in wave-like pulses — families wade, build sand castles, and sled down dunes into the water.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7CFDEA-1DD8-B71B-0B5A198106C9A109.jpg"}, {"name": "Stargazing on the Dune Field", "desc": "Hike into the dune field at night for world-class stargazing — the flat expanse and high elevation make for extraordinary views of the Milky Way.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7D0109-1DD8-B71B-0B95485B738AE811.jpg"}], "bestTime": "May – Jun, Sep – Oct", "bestTimeTip": "June offers Medano Creek plus bearable dune temperatures. Dune surface temperatures can reach 150°F in July.", "nearestCity": "Alamosa, CO (ALS)", "flightTime": "~5h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly to Denver (DEN) ~4.5h drive, or Colorado Springs (COS) ~3.5h drive."}, {"name": "Great Smoky Mountains", "state": "Tennessee/North Carolina", "lat": 35.61, "lng": -83.53, "img": "https://www.nps.gov/common/uploads/structured_data/3C80E3F4-1DD8-B71B-0BFF4F2280EF1B52.jpg", "attractions": [{"name": "Clingmans Dome — Highest Point on the AT", "desc": "Ascend to 6,643 feet for 360° views over a sea of forested ridges at the highest point on the Appalachian Trail — a panorama stretching into seven states.", "img": "https://www.nps.gov/common/uploads/structured_data/3C80EC37-1DD8-B71B-0B87F63E8B030D15.jpg"}, {"name": "Roaring Fork Motor Nature Trail", "desc": "A 5.5-mile one-way drive through old-growth forest and past historic log cabins, cascading streams, and multiple waterfalls.", "img": "https://www.nps.gov/common/uploads/structured_data/62D22291-ECC1-C9C6-D4C249F41BC599CC.jpg"}, {"name": "Synchronous Firefly Event", "desc": "Each June, thousands of synchronous fireflies coordinate their flashes in a breathtaking light show in Elkmont — a lottery is required for the nightly shuttle.", "img": "https://www.nps.gov/common/uploads/structured_data/3C80F02B-1DD8-B71B-0BBC2DFD4E9349E9.jpg"}], "bestTime": "Apr – Jun, Sep – Oct", "bestTimeTip": "America's most visited national park (13M visitors/year) — go midweek and early morning. Fall foliage peaks mid-October.", "nearestCity": "Knoxville, TN (TYS)", "flightTime": "~3h (1 stop)", "flightCost": "$150–350", "flightNote": "Fly to Knoxville (TYS) ~45 min drive, or Asheville (AVL) ~1h. Gatlinburg is the gateway town."}, {"name": "Guadalupe Mountains", "state": "Texas", "lat": 31.92, "lng": -104.87, "img": "https://www.nps.gov/common/uploads/structured_data/3C825533-1DD8-B71B-0B6FDF436F604A3C.jpg", "attractions": [{"name": "Guadalupe Peak — Highest Point in Texas", "desc": "The 8.4-mile round-trip to Guadalupe Peak (8,751 ft) rewards with panoramic desert views and the dramatic El Capitan prow visible from 50 miles.", "img": "https://www.nps.gov/common/uploads/structured_data/3C825A11-1DD8-B71B-0BAAA0BDF174AA2F.jpg"}, {"name": "McKittrick Canyon Fall Foliage", "desc": "McKittrick Canyon blazes with maple, ash, and walnut foliage every October — a surreal sight in the Chihuahuan Desert, voted one of Texas's most beautiful natural areas.", "img": "https://www.nps.gov/common/uploads/structured_data/3C8256DA-1DD8-B71B-0B7E4BE83A8B56F9.jpg"}, {"name": "Devil's Hall Trail", "desc": "A 4.2-mile hike through a dry streambed that narrows into a dramatic staircase canyon with 60-foot limestone walls — like a scaled-down Zion Narrows in Texas.", "img": "https://www.nps.gov/common/uploads/structured_data/3C82588D-1DD8-B71B-0B233383D71368EB.jpg"}], "bestTime": "Mar – Apr, Oct – Nov", "bestTimeTip": "October for spectacular fall foliage in McKittrick Canyon. Fewer than 200,000 visitors per year.", "nearestCity": "El Paso, TX (ELP)", "flightTime": "~4h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to El Paso (ELP) ~110 miles west. Often combined with Carlsbad Caverns (2h drive)."}, {"name": "Haleakalā", "state": "Hawaii", "lat": 20.72, "lng": -156.15, "img": "https://www.nps.gov/common/uploads/structured_data/3D05E583-1DD8-B71B-0BBFF82F7F78AF6A.jpg", "attractions": [{"name": "Summit Sunrise — Most Sacred in Hawaii", "desc": "Watch the sun rise above the clouds from the summit of a dormant volcano (10,023 ft) — timed entry permits are required months in advance for this iconic experience.", "img": "https://www.nps.gov/common/uploads/structured_data/3D3323B6-1DD8-B71B-0B78ACA534C1D05E.jpg"}, {"name": "Sliding Sands Trail into the Crater", "desc": "Descend 2,500 feet into a lunar volcanic crater the size of Manhattan past cinder cones, silversword plants (found only here), and Mars-like terrain.", "img": "https://www.nps.gov/common/uploads/structured_data/3D771172-1DD8-B71B-0B981DA08B1FE163.jpg"}, {"name": "Bicycle Descent from Summit", "desc": "Guided groups bike 23 miles downhill from the summit to sea level through cloud banks, cattle ranches, and pineapple fields — one of the most exhilarating rides in the Pacific.", "img": "https://www.nps.gov/common/uploads/structured_data/3C87A368-1DD8-B71B-0BD44B189D0D9368.jpg"}], "bestTime": "All year (summit anytime)", "bestTimeTip": "Sunrise permits require reservations up to 60 days in advance — plan ahead. Lower Kipahulu has waterfall hikes.", "nearestCity": "Kahului, HI (OGG)", "flightTime": "~10–11h (1 stop)", "flightCost": "$400–800", "flightNote": "Fly to Kahului (OGG) on Maui via Honolulu. Rental car essential."}, {"name": "Hawaiʻi Volcanoes", "state": "Hawaii", "lat": 19.43, "lng": -155.26, "img": "https://www.nps.gov/common/uploads/structured_data/C4E8415A-08E5-5976-833F494FFCA3FFE6.jpg", "attractions": [{"name": "Kīlauea Caldera & Halemaʻumaʻu Crater", "desc": "Watch the most active volcano on Earth — Kīlauea's lava lake glows brilliant orange at night, emitting 2,000+ tons of sulfur dioxide daily in a primal display.", "img": "https://www.nps.gov/common/uploads/structured_data/C5AEDF53-AE4A-F6DB-2FBA7BE158386C0E.jpg"}, {"name": "Chain of Craters Road to the Coast", "desc": "Drive to where hardened lava flows meet the Pacific Ocean — dramatic sea arches, ancient petroglyphs, and coastal lava landscapes stretch for miles.", "img": "https://www.nps.gov/common/uploads/structured_data/C5D3655B-BF42-2E22-8068376035581BB2.jpg"}, {"name": "Thurston Lava Tube Walk", "desc": "Walk through a 500-year-old lava tube — a cathedral-like underground tunnel formed when the outer shell of a lava flow cooled and lava drained from within.", "img": "https://www.nps.gov/common/uploads/structured_data/C69391EE-FBFA-BC85-885A49C4BD5CEC8D.jpg"}], "bestTime": "All year", "bestTimeTip": "Lava viewing is best at night. Activity varies unpredictably — always check USGS Hawaiian Volcano Observatory before visiting.", "nearestCity": "Hilo, HI (ITO)", "flightTime": "~11h (1–2 stops)", "flightCost": "$450–900", "flightNote": "Fly to Hilo (ITO) ~30 min drive, or Kona (KOA) ~1.5h. Connect via Honolulu or Los Angeles."}, {"name": "Hot Springs", "state": "Arkansas", "lat": 34.51, "lng": -93.05, "img": "https://www.nps.gov/common/uploads/structured_data/C0D8DFDD-F151-C5B0-3004B0088C98BA5A.jpg", "attractions": [{"name": "Bathhouse Row Historic Bathing", "desc": "Eight magnificent Gilded Age bathhouses line Central Avenue — the only intact collection in the US. Two still operate for authentic 143°F thermal spring soaks.", "img": "https://www.nps.gov/common/uploads/structured_data/C13C707D-B623-9D92-5CF6C917AA1B9078.jpg"}, {"name": "Hot Springs Mountain Tower Views", "desc": "Ascend the observation tower for panoramic views of the Ouachita Mountains and the historic downtown — the most scenic overlook in the Ouachita National Forest.", "img": "https://www.nps.gov/common/uploads/structured_data/C11CC032-E6FC-33A3-A850BBC58A6DBD3C.jpg"}, {"name": "Fordyce Bathhouse Museum Tour", "desc": "Walk through the most elaborate of the eight bathhouses — fully restored with stained glass, gymnasium, and displays revealing why presidents and gangsters frequented Hot Springs.", "img": "https://www.nps.gov/common/uploads/structured_data/2417D601-FF9E-BFD8-5C6BD4375064FAD1.jpg"}], "bestTime": "Mar – May, Sep – Nov", "bestTimeTip": "The thermal springs flow year-round at a constant 143°F. Spring blooms in Garvan Woodland Gardens are stunning.", "nearestCity": "Little Rock, AR (LIT)", "flightTime": "~3h (1 stop)", "flightCost": "$150–350", "flightNote": "Fly to Little Rock (LIT) ~55 miles east. Connections required from NYC."}, {"name": "Indiana Dunes", "state": "Indiana", "lat": 41.65, "lng": -87.05, "img": "https://www.nps.gov/common/uploads/structured_data/9253EDFB-AAFD-E111-B985CD2747F5C48F.jpg", "attractions": [{"name": "Three Dune Challenge", "desc": "Conquer three dunes totaling 552 feet of elevation gain — with Lake Michigan and the Chicago skyline visible from the top.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7E501C-1DD8-B71B-0B78424BE2B09114.jpg"}, {"name": "Cowles Bog National Landmark", "desc": "Hike through a mosaic of rare plant communities — the research site that established the science of plant succession, with carnivorous sundews and ancient bog peat.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7E49C3-1DD8-B71B-0B66A187F21A2292.jpg"}, {"name": "Lake Michigan Swimming & Chicago Skyline", "desc": "Swim in a freshwater Great Lake with the improbable view of downtown Chicago's skyscrapers on the horizon — one of the most surreal urban-nature contrasts in the US.", "img": "https://www.nps.gov/common/uploads/structured_data/93317C03-A0F6-3587-DEFBDE06D879DF16.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "Accessible from Chicago by South Shore train — no car needed! Summer beach season is excellent.", "nearestCity": "Chicago, IL (ORD)", "flightTime": "~2h (direct)", "flightCost": "$100–250", "flightNote": "Many direct NYC to Chicago flights. Take the South Shore commuter train (no car needed) — 1.5h to the park."}, {"name": "Isle Royale", "state": "Michigan", "lat": 47.99, "lng": -88.91, "img": "https://www.nps.gov/common/uploads/structured_data/6059CAD8-02E8-2E00-2922DF84800167E0.jpg", "attractions": [{"name": "Rock Harbor Lodge & Lake Superior Kayaking", "desc": "Kayak the deep blue waters of Lake Superior past moose wading in coves, osprey diving for fish, and loons calling in America's least-visited national park.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AC799-1DD8-B71B-0B4E94DE10F014E5.jpg"}, {"name": "Wolf & Moose Wilderness Research", "desc": "Isle Royale hosts the world's longest-running predator-prey study — spot moose on remote trails in a wilderness with no roads and fewer visitors than Yellowstone gets in a single day.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AC355-1DD8-B71B-0B9C2F07853F39F1.jpg"}, {"name": "Greenstone Ridge Trail Backpacking", "desc": "Hike the 40-mile spine of the island through boreal forest and rocky ridge — a multi-day wilderness backpack that crosses the entire island with Lake Superior views.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AC4C1-1DD8-B71B-0B8592CA6634ABEE.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "Only accessible by boat or floatplane. The park is entirely closed November–April. No roads exist on the island.", "nearestCity": "Houghton, MI (CMX)", "flightTime": "~4h (1–2 stops)", "flightCost": "$250–500", "flightNote": "Fly to Houghton (CMX) or Duluth (DLH), then take the park ferry (3–6h)."}, {"name": "Joshua Tree", "state": "California", "lat": 33.88, "lng": -115.9, "img": "https://www.nps.gov/common/uploads/structured_data/306D0D93-9CCA-76E1-AD48268F8D7A7E3E.jpg", "attractions": [{"name": "Cholla Cactus Garden at Sunset", "desc": "A dense forest of teddy bear cholla cactus glows golden at sunset — each spine individually backlit, transforming a painful plant into something hauntingly beautiful.", "img": "https://www.nps.gov/common/uploads/structured_data/3C85EDAE-1DD8-B71B-0B3E7EAC7E299A23.jpg"}, {"name": "Skull Rock & Hidden Valley Bouldering", "desc": "Scramble through surreal granite boulder formations to Skull Rock, then explore Hidden Valley — a ring of boulders sheltering a secret basin once used by cattle rustlers.", "img": "https://www.nps.gov/common/uploads/structured_data/3C85EC5C-1DD8-B71B-0B3B00469411625A.jpg"}, {"name": "Milky Way Astrophotography", "desc": "One of the best dark sky parks in Southern California — a billion stars, the galactic core, and Joshua tree silhouettes make for extraordinary astrophotography.", "img": "https://www.nps.gov/common/uploads/structured_data/3C85E84D-1DD8-B71B-0B188E7820D60F14.jpg"}], "bestTime": "Oct – May", "bestTimeTip": "Summer temperatures exceed 110°F — dangerous. Spring brings wildflowers and perfect hiking weather. The park has no water — bring everything.", "nearestCity": "Palm Springs, CA (PSP)", "flightTime": "~5.5h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to Palm Springs (PSP) ~45 min drive, or Los Angeles (LAX) ~2.5h."}, {"name": "Katmai", "state": "Alaska", "lat": 58.5, "lng": -154.0, "img": "https://www.nps.gov/common/uploads/structured_data/3C7A0FDB-1DD8-B71B-0B8933ACA92FE6B3.jpg", "attractions": [{"name": "Brooks Falls Bear Viewing", "desc": "Stand on a platform as brown bears catch sockeye salmon mid-leap — the most reliable place on Earth to photograph bears catching fish, with 2,200+ bears in the park.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A32DB-1DD8-B71B-0B37F66E9D0832AF.jpg"}, {"name": "Valley of Ten Thousand Smokes", "desc": "A lunar landscape carved by the 1912 Novarupta eruption — the largest volcanic eruption of the 20th century — a 40-square-mile ash flow valley still fumarolic a century later.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A3473-1DD8-B71B-0B65158B5807CE0D.jpg"}, {"name": "Hallo Bay Coastal Bear Viewing", "desc": "A remote coastal bay where bears forage on clams, sedge grass, and salmon at sea level — accessible only by charter flight from King Salmon.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A35BF-1DD8-B71B-0BB1644AA6CF4C8B.jpg"}], "bestTime": "Jul – Sep", "bestTimeTip": "Famous Fat Bear Week runs in early October. Brooks Camp cabin reservations are a lottery opening in January.", "nearestCity": "King Salmon, AK (AKN)", "flightTime": "~9h (2 stops)", "flightCost": "$500–1,000", "flightNote": "Fly NYC to Anchorage then King Salmon (AKN), then floatplane to Brooks Camp. Plan 3–4 days minimum."}, {"name": "Kenai Fjords", "state": "Alaska", "lat": 59.92, "lng": -149.65, "img": "https://www.nps.gov/common/uploads/structured_data/3C798EAB-1DD8-B71B-0BC4BEFB197F2C90.jpg", "attractions": [{"name": "Exit Glacier — Walk to the Ice", "desc": "The only part of the park accessible by road — hike to the face of Exit Glacier and touch the ice of the Harding Icefield's only accessible outlet glacier.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7DE352-1DD8-B71B-0B35831ADF254DE0.jpg"}, {"name": "Kenai Fjords Glacier Cruise", "desc": "A day-long boat tour — seas packed with humpback whales, orcas, puffins, sea lions, and calving tidewater glaciers up close.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7DE50D-1DD8-B71B-0B23431BC04ACB33.jpg"}, {"name": "Harding Icefield Trail", "desc": "A strenuous 8.2-mile round-trip to the edge of one of the largest icefields in the US — stretching to the horizon in an overwhelming expanse of ice and mountains.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7DE88C-1DD8-B71B-0B3F02FD7F30F1AF.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "Seward is the gateway — a 2.5h drive or scenic train from Anchorage. Bring waterproof layers; the park receives 70+ inches of rain/year.", "nearestCity": "Anchorage, AK (ANC)", "flightTime": "~8h (1 stop)", "flightCost": "$400–800", "flightNote": "Fly to Anchorage (ANC) then drive or take Alaska Railroad 2.5h to Seward."}, {"name": "Kings Canyon", "state": "California", "lat": 36.89, "lng": -118.55, "img": "https://www.nps.gov/common/uploads/structured_data/3C7A250B-1DD8-B71B-0BCF61A89A8B2970.jpg", "attractions": [{"name": "General Grant Tree — Nation's Christmas Tree", "desc": "Stand before the 267-foot General Grant Tree — the world's second largest by volume and designated the Nation's Christmas Tree by Congress.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A2835-1DD8-B71B-0B468E834049FBE4.jpg"}, {"name": "Kings Canyon Scenic Byway", "desc": "Drive to Road's End at one of the deepest canyons in North America — sheer granite walls rise 8,200 feet above the Kings River.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A2E1B-1DD8-B71B-0B4D563CB47FA60F.jpg"}, {"name": "Zumwalt Meadows Loop Hike", "desc": "Walk through a pristine granite-rimmed meadow along the Kings River with dramatic canyon walls overhead — perfect wildflower viewing in July.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A301B-1DD8-B71B-0B8311F9B0AC4F69.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "Kings Canyon Road closes in winter. Combined with Sequoia NP, plan at least 2 full days.", "nearestCity": "Fresno, CA (FAT)", "flightTime": "~6h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly to Fresno (FAT) ~1.5h drive north. Most route through LAX or SFO."}, {"name": "Kobuk Valley", "state": "Alaska", "lat": 67.55, "lng": -159.15, "img": "https://www.nps.gov/common/uploads/structured_data/3C7A1214-1DD8-B71B-0B00D823BD9BF4CF.jpg", "attractions": [{"name": "Great Kobuk Sand Dunes", "desc": "25 square miles of active Arctic sand dunes — some reaching 100 feet high — covering an ice-age landscape that has existed for 24,000 years in the Arctic.", "img": "https://www.nps.gov/common/uploads/structured_data/9B41FCED-9287-749E-01E2C1A2DFE31A1A.jpg"}, {"name": "Kobuk River Float", "desc": "Float the wild Kobuk River through an Arctic valley with no trails, no roads, and almost no visitors — passing caribou migration corridors and vast boreal wilderness.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A134A-1DD8-B71B-0B3C2789713B6113.jpg"}, {"name": "Western Arctic Caribou Migration", "desc": "In September, the world's largest remaining caribou herd (470,000+ animals) crosses the park in a dramatic migration across the tundra.", "img": "https://www.nps.gov/common/uploads/structured_data/9B57B97E-9471-A430-A0233761F8133CE6.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "No roads, no trails, no visitor services. Access only by bush plane from Kotzebue or Bettles. One of the least-visited national parks in the US.", "nearestCity": "Kotzebue, AK (OTZ)", "flightTime": "~9h (2 stops)", "flightCost": "$600–1,200", "flightNote": "Fly to Kotzebue (OTZ) via Anchorage, then charter a bush plane to the dunes."}, {"name": "Lake Clark", "state": "Alaska", "lat": 60.97, "lng": -153.42, "img": "https://www.nps.gov/common/uploads/structured_data/3C7A9F9E-1DD8-B71B-0B6CEC8EF3F377DA.jpg", "attractions": [{"name": "Silver Salmon Creek Bear Viewing", "desc": "Watch coastal brown bears catching silver salmon and foraging on clams at a remote coastal beach — one of the most intimate bear viewing experiences in Alaska.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AA462-1DD8-B71B-0BB13D97381C04B0.jpg"}, {"name": "Turquoise Lake Alpine Wilderness", "desc": "Floatplanes land on sparkling Turquoise Lake, base camp for multi-day hikes across alpine tundra with views of active volcanoes and glaciated peaks.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AA140-1DD8-B71B-0BE3ECC0A8EE0DE5.jpg"}, {"name": "Chinitna Bay Coastal Brown Bear", "desc": "Watch coastal brown bears foraging on clams and salmon at sea level — reached by floatplane from Anchorage for intimate bear encounters.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A9D02-1DD8-B71B-0B154E93FCC5D7F9.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "No roads enter the park. Bear viewing peaks July–September. Floatplane charters from Anchorage cost $600–1,200+.", "nearestCity": "Anchorage, AK (ANC)", "flightTime": "~8h (1 stop)", "flightCost": "$500–1,000", "flightNote": "Fly to Anchorage then charter a floatplane (~1–1.5h). Budget $800+ for air charter."}, {"name": "Lassen Volcanic", "state": "California", "lat": 40.49, "lng": -121.51, "img": "https://www.nps.gov/common/uploads/structured_data/3C873811-1DD8-B71B-0B9C62ED8E12E7B5.jpg", "attractions": [{"name": "Bumpass Hell Hydrothermal Area", "desc": "A 3-mile round-trip hike leads to the park's largest hydrothermal area — boiling mud pots, fumaroles, and sulfurous hot springs in a stark lunar landscape.", "img": "https://www.nps.gov/common/uploads/structured_data/3C8739BB-1DD8-B71B-0B8336A925B1A6C7.jpg"}, {"name": "Lassen Peak Summit Hike", "desc": "A 5-mile round-trip to the summit of the largest plug dome volcano on Earth (10,457 ft) with views of Mount Shasta and the Sacramento Valley.", "img": "https://www.nps.gov/common/uploads/structured_data/3C873B2E-1DD8-B71B-0B28C044BC4B9DC6.jpg"}, {"name": "Manzanita Lake Reflection Photography", "desc": "At dawn, the glassy surface of Manzanita Lake mirrors the perfect volcanic cone of Lassen Peak — one of the most serene lake reflections in the Pacific West.", "img": "https://www.nps.gov/common/uploads/structured_data/3C873CC3-1DD8-B71B-0B076FC2806DF140.jpg"}], "bestTime": "Jul – Sep", "bestTimeTip": "Heavy snowpack keeps the park road closed until July. Late summer offers all trails accessible and hydrothermal features at their most active.", "nearestCity": "Redding, CA (RDD)", "flightTime": "~6h (1 stop)", "flightCost": "$250–550", "flightNote": "Fly to Sacramento (SMF) ~2.5h drive, or Redding (RDD) ~1h drive."}, {"name": "Mammoth Cave", "state": "Kentucky", "lat": 37.18, "lng": -86.1, "img": "https://www.nps.gov/common/uploads/structured_data/95EAA431-F26B-66EB-E9E6B108F47F70B0.jpg", "attractions": [{"name": "Grand Avenue Tour — 4-Mile Underground", "desc": "Explore four miles of the world's longest known cave system — passing vast rooms with names like Snowball Dining Room and Domes & Dripstones.", "img": "https://www.nps.gov/common/uploads/structured_data/947D4300-ECE7-A506-8A6FF2BA4AECCFBB.jpg"}, {"name": "Wild Cave Tour", "desc": "Don a helmet and headlamp to squeeze through narrow passages, crawl through mud, and chimney up vertical cracks — authentic spelunking in the world's longest cave.", "img": "https://www.nps.gov/common/uploads/structured_data/94A76787-FA1B-8DC8-71277FDFA5E7CC79.jpg"}, {"name": "Green River Canoe Float", "desc": "Paddle the Green River through a pristine wilderness above the underground maze — home to 130+ cave ecosystem species found nowhere else on Earth.", "img": "https://www.nps.gov/common/uploads/structured_data/94F61E66-ACE7-ED8C-FC411F6BFDD80490.jpg"}], "bestTime": "Apr – Oct", "bestTimeTip": "Cave maintains 54°F year-round — perfect for hot summer days. Book cave tours well in advance.", "nearestCity": "Nashville, TN (BNA)", "flightTime": "~3h (direct)", "flightCost": "$150–350", "flightNote": "Fly to Nashville (BNA) ~1.5h drive north, or Louisville (SDF) ~1.5h south."}, {"name": "Mesa Verde", "state": "Colorado", "lat": 37.18, "lng": -108.49, "img": "https://www.nps.gov/common/uploads/structured_data/3C7C0089-1DD8-B71B-0BC397BA671C0616.jpg", "attractions": [{"name": "Cliff Palace — Largest Cliff Dwelling in North America", "desc": "The largest cliff dwelling on the continent — 150 rooms and 23 kivas carved into a sandstone alcove by the Ancestral Puebloans 700–900 years ago. Timed tickets required.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7C0207-1DD8-B71B-0B74281D9C40EAB9.jpg"}, {"name": "Balcony House Ladder Climb", "desc": "Climb a 32-foot ladder into a cliff dwelling accessible only through a narrow rock tunnel — one of the most thrilling archaeological sites in the US.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7C0371-1DD8-B71B-0B50861380661D68.jpg"}, {"name": "Chapin Mesa Archeological Museum", "desc": "One of the finest Native American archaeology museums in the US — 13,000 years of human history with original artifacts from 600+ cliff dwelling sites.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7C04EC-1DD8-B71B-0BD94A784A808041.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "Cliff dwelling tours require timed tickets — book weeks in advance. Summer sunrise over canyon country is unforgettable.", "nearestCity": "Durango, CO (DRO)", "flightTime": "~5h (1 stop)", "flightCost": "$250–550", "flightNote": "Fly to Durango (DRO) ~35 min drive, or Grand Junction (GJT) ~2h. Most connections via Denver."}, {"name": "Mount Rainier", "state": "Washington", "lat": 46.85, "lng": -121.75, "img": "https://www.nps.gov/common/uploads/structured_data/49F34094-B893-7DD6-5AE0F0220724B0EF.jpg", "attractions": [{"name": "Paradise Wildflower Meadows", "desc": "July and August transform Paradise into a painting — sub-alpine meadows explode with lupine, paintbrush, and avalanche lilies against the glaciated 14,411-foot volcano.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7CEEF2-1DD8-B71B-0B9F3B666327E5D1.jpg"}, {"name": "Emmons Glacier — Largest in the Lower 48", "desc": "Hike above Camp Schurman for intimate views of crevasses and seracs on the largest glacier in the contiguous United States.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7C6C47-1DD8-B71B-0BFF9108D08A7FD3.jpg"}, {"name": "Skyline Trail at Paradise", "desc": "A 5-mile sub-alpine loop through meadows up to Panorama Point (6,800 ft) for 360° views of the glaciated volcano and surrounding Cascade peaks.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7C6D8C-1DD8-B71B-0BA69E7F583E25A5.jpg"}], "bestTime": "Jul – Sep", "bestTimeTip": "Paradise Road can close until mid-July. Peak wildflowers occur late July. The mountain creates its own weather — check forecasts daily.", "nearestCity": "Seattle, WA (SEA)", "flightTime": "~6h (direct)", "flightCost": "$200–450", "flightNote": "Many direct NYC to Seattle flights. Park is ~2h drive southeast. Rental car essential."}, {"name": "New River Gorge", "state": "West Virginia", "lat": 38.07, "lng": -81.08, "img": "https://www.nps.gov/common/uploads/structured_data/3C7E8C70-1DD8-B71B-0B00C7B2373E386E.jpg", "attractions": [{"name": "New River Gorge Bridge Walk", "desc": "Walk the catwalk beneath America's longest steel span arch bridge (876 feet above the river) for a dizzying perspective on the deepest gorge east of the Mississippi.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7E8DAE-1DD8-B71B-0B9B0DDABB90EA30.jpg"}, {"name": "Class V Whitewater Rafting", "desc": "Raft the most thrilling whitewater section east of the Mississippi — legendary Class V rapids through ancient Appalachian wilderness.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7E8F1F-1DD8-B71B-0B03B737CD7AE489.jpg"}, {"name": "Long Point Trail Overlook", "desc": "A moderate 3-mile round-trip through old-growth forest leads to a sandstone promontory with the definitive aerial perspective of the New River Gorge Bridge.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7E907D-1DD8-B71B-0B502C95583F514E.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "Bridge Day (third Saturday in October) lets BASE jumpers leap from the bridge. Fall colors peak mid-October. Designated a national park in 2020.", "nearestCity": "Charleston, WV (CRW)", "flightTime": "~2–3h (1 stop)", "flightCost": "$150–350", "flightNote": "Fly to Charleston (CRW) ~1h drive east. Connections required from NYC."}, {"name": "North Cascades", "state": "Washington", "lat": 48.7, "lng": -121.2, "img": "https://www.nps.gov/common/uploads/structured_data/3C7A599D-1DD8-B71B-0BBDC12BEC5107B5.jpg", "attractions": [{"name": "Cascade Pass Wildflower Hike", "desc": "A 7-mile round-trip trail through sub-alpine paradise with panoramic views of glaciated peaks, wildflower meadows, and hanging glaciers.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A5B0D-1DD8-B71B-0B1104A95B7A2026.jpg"}, {"name": "Diablo Lake Turquoise Waters", "desc": "Paddle or photograph impossibly turquoise water — colored by glacial flour — with serrated peaks reflecting in the still surface of this stunning alpine reservoir.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A5CC2-1DD8-B71B-0BC0F615561921EE.jpg"}, {"name": "Ross Lake National Recreation Area", "desc": "A remote turquoise reservoir ringed by steep forested slopes — accessible only by boat or trail, offering world-class kayaking in one of the least-visited NPS areas.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A5E46-1DD8-B71B-0B63BF950D3D6FB2.jpg"}], "bestTime": "Jul – Sep", "bestTimeTip": "Heavy snowpack closes high trails until July. One of the least-visited parks despite stunning scenery.", "nearestCity": "Seattle, WA (SEA)", "flightTime": "~6h (direct)", "flightCost": "$200–450", "flightNote": "Fly to Seattle (SEA) ~3h drive east. No developed visitor services — plan ahead."}, {"name": "Olympic", "state": "Washington", "lat": 47.97, "lng": -123.5, "img": "https://www.nps.gov/common/uploads/structured_data/3C7B1DB4-1DD8-B71B-0B9DFEFDD398DB71.jpg", "attractions": [{"name": "Hoh Rainforest Hall of Mosses", "desc": "Walk through cathedral-like big leaf maples draped in ethereal green moss in one of the few temperate rainforests in North America — receiving 12+ feet of rain yearly.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B20CD-1DD8-B71B-0B9ACC145EFE6B99.jpg"}, {"name": "Ruby Beach Olympic Coastline", "desc": "Sea stacks, tide pools, driftwood-strewn beaches, and crashing Pacific waves framed by ancient rainforest — one of the wildest coastlines in the US.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B1C43-1DD8-B71B-0B40240896925A49.jpg"}, {"name": "Hurricane Ridge Alpine Meadows", "desc": "Drive to 5,242 feet where sub-alpine meadows bloom with wildflowers above the clouds — Olympic marmots sun on rocks while the Strait of Juan de Fuca glitters below.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7B1F36-1DD8-B71B-0B367264CE3B4EE8.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "The rainforest is green and magical year-round. Summer offers the best chance of clear mountain views. Always bring rain gear.", "nearestCity": "Seattle, WA (SEA)", "flightTime": "~6h (direct)", "flightCost": "$200–450", "flightNote": "Fly to Seattle (SEA) ~3h drive including ferry crossing. Plan 3+ days for the full experience."}, {"name": "Petrified Forest", "state": "Arizona", "lat": 35.07, "lng": -109.78, "img": "https://www.nps.gov/common/uploads/structured_data/3C7D8213-1DD8-B71B-0BE4A3B9394FD89A.jpg", "attractions": [{"name": "Crystal Forest Petrified Log Walk", "desc": "Walk among the largest concentration of petrified wood in the world — 225-million-year-old trees replaced by quartz crystal in purple, red, and yellow hues.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7D83C9-1DD8-B71B-0B294D0F9ABC4B94.jpg"}, {"name": "Painted Desert Vista Points", "desc": "A 28-mile scenic road links overlooks of the Painted Desert — banded layers of Triassic badlands striped in purple, red, and cream that glow most vividly at sunrise.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7D8582-1DD8-B71B-0BCCD89452609E15.jpg"}, {"name": "Dark Sky Wilderness Stargazing", "desc": "Step into one of the few Wilderness Areas that is also a Dark Sky Park — a billion stars blaze over multicolored Triassic badlands.", "img": "https://www.nps.gov/common/uploads/structured_data/3C85B076-1DD8-B71B-0BE0B8C88713C5B1.jpg"}], "bestTime": "Apr – Jun, Sep – Oct", "bestTimeTip": "The Painted Desert is most colorful after afternoon monsoon rains in August. Beautiful year-round.", "nearestCity": "Flagstaff, AZ (FLG)", "flightTime": "~5h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to Phoenix (PHX) ~3.5h drive or Flagstaff (FLG) ~2h drive. On I-40, easily combined with Grand Canyon."}, {"name": "Pinnacles", "state": "California", "lat": 36.49, "lng": -121.2, "img": "https://www.nps.gov/common/uploads/structured_data/3C86A8CB-1DD8-B71B-0BAE8F7141CCBB1B.jpg", "attractions": [{"name": "California Condor Viewing", "desc": "Home to one of the largest free-flying California condor populations — hike the ridge trails at dusk for a good chance of watching these massive 9-foot wingspan birds soar.", "img": "https://www.nps.gov/common/uploads/structured_data/3C86AAE7-1DD8-B71B-0BA8BC5E5E895E98.jpg"}, {"name": "Balconies Cave System", "desc": "Navigate with headlamps through a talus cave — collapsed rock passages creating dark tunnels, emerging at a hidden reservoir on the park's most adventurous trail.", "img": "https://www.nps.gov/common/uploads/structured_data/3C86AE8B-1DD8-B71B-0B3ACEBC064CCC03.jpg"}, {"name": "High Peaks Trail Scramble", "desc": "A dramatic ridge traverse with iron handholds bolted into sheer rock faces — overlooking a sea of spires carved from an ancient volcano.", "img": "https://www.nps.gov/common/uploads/structured_data/9CCA8ED3-ABB9-CB69-EF4B32F2ADACEC47.jpeg"}], "bestTime": "Mar – May, Sep – Nov", "bestTimeTip": "Summer is extremely hot (100°F+). Spring wildflowers are excellent. Fall is ideal for condor viewing.", "nearestCity": "San Jose, CA (SJC)", "flightTime": "~6h (1 stop)", "flightCost": "$150–350", "flightNote": "Fly to San Jose (SJC) ~2h drive south, or San Francisco (SFO) ~3h."}, {"name": "Redwood", "state": "California", "lat": 41.3, "lng": -124.0, "img": "https://www.nps.gov/common/uploads/structured_data/CD69DD56-E050-4F4E-DDF622317D38250E.jpg", "attractions": [{"name": "Avenue of the Giants Drive", "desc": "A 31-mile alternate highway through a cathedral tunnel of ancient redwoods — some over 2,000 years old and 350 feet tall — creating a green-filtered, silent world.", "img": "https://www.nps.gov/common/uploads/structured_data/13FB649C-1DD8-B71B-0B50D0E826025619.jpg"}, {"name": "Gold Bluffs Beach & Fern Canyon", "desc": "Drive a rugged coastal road to a pristine beach backed by 50-foot fern-draped canyon walls where Spielberg filmed a Jurassic Park 2 scene — utterly magical.", "img": "https://www.nps.gov/common/uploads/structured_data/13C2D9FD-1DD8-B71B-0B3C56643E2A396D.jpg"}, {"name": "Prairie Creek Elk Meadow", "desc": "A large herd of Roosevelt elk grazes openly in a coastal meadow surrounded by ancient redwoods — the most accessible elk viewing in California.", "img": "https://www.nps.gov/common/uploads/structured_data/6B440E44-1DD8-B71B-0B6E95D9C432231F.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "Summer fog keeps temperatures cool (55–65°F) even in July. Gold Bluffs Beach Road requires high clearance.", "nearestCity": "Eureka, CA (ACV)", "flightTime": "~8h (1–2 stops)", "flightCost": "$300–600", "flightNote": "Fly to Arcata/Eureka (ACV) ~30 min drive, or San Francisco (SFO) ~5h drive."}, {"name": "Rocky Mountain", "state": "Colorado", "lat": 40.34, "lng": -105.68, "img": "https://www.nps.gov/common/uploads/structured_data/25871823-F36D-9986-8C552F7496B7D557.jpg", "attractions": [{"name": "Trail Ridge Road — Roof of the Rockies", "desc": "America's highest continuous paved road crests at 12,183 feet — crossing alpine tundra where marmots, pikas, and elk graze in wildflower meadows.", "img": "https://www.nps.gov/common/uploads/structured_data/25DE2A3F-EF40-16CC-AB4645848692560C.jpg"}, {"name": "Bear Lake & Emerald Lake Loop", "desc": "The park's most popular trail circles alpine Bear Lake before climbing past Nymph Lake and Dream Lake to turquoise Emerald Lake.", "img": "https://www.nps.gov/common/uploads/structured_data/259CAEEE-BD13-92E2-C510A3F71BCBFA2F.jpg"}, {"name": "Elk Rut in Moraine Park (September)", "desc": "Each September, massive bull elk battle for dominance in Moraine Park's open meadow while bugling hauntingly — one of the most dramatic wildlife spectacles in any US national park.", "img": "https://www.nps.gov/common/uploads/structured_data/25B4B9D7-953A-9999-788210BBBD93CC77.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "Trail Ridge Road opens late May/June. Timed entry permits required in summer. September elk rut is extraordinary — go at dawn to Moraine Park.", "nearestCity": "Denver, CO (DEN)", "flightTime": "~4h (direct)", "flightCost": "$150–350", "flightNote": "Many direct NYC to Denver flights. Estes Park gateway is ~1.5h drive from Denver."}, {"name": "Saguaro", "state": "Arizona", "lat": 32.25, "lng": -111.0, "img": "https://www.nps.gov/common/uploads/structured_data/5CB8B2F6-01B7-9A50-73702A355E4136B8.jpg", "attractions": [{"name": "Desert Discovery Nature Trail at Sunrise", "desc": "Walk among 150-year-old saguaro cacti in the Sonoran Desert at golden hour — the iconic columnar cacti glow orange and their shadows stretch impossibly long.", "img": "https://www.nps.gov/common/uploads/structured_data/3C858462-1DD8-B71B-0BB499810C61332C.jpg"}, {"name": "Rincon Mountain Wilderness Backpack", "desc": "Hike into the remote Rincon Mountains (8,666 ft) through five ecosystems — from saguaro forest to pine-fir forest — on trails connecting backcountry cabins.", "img": "https://www.nps.gov/common/uploads/structured_data/3C858613-1DD8-B71B-0BEFB533FAB3FB55.jpg"}, {"name": "Saguaro Sunset at Javelina Rocks", "desc": "Watch the desert sky ignite in orange and magenta above a forest of giant saguaros as javelinas and coyotes emerge for the evening.", "img": "https://www.nps.gov/common/uploads/structured_data/3C85873C-1DD8-B71B-0BA5D81599611142.jpg"}], "bestTime": "Nov – Apr", "bestTimeTip": "Summer temperatures exceed 110°F. Saguaro cacti bloom in May with white flowers. Spring wildflowers after winter rains can be spectacular.", "nearestCity": "Tucson, AZ (TUS)", "flightTime": "~5h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to Tucson (TUS) — the park is literally inside the city limits. Two separate districts: west and east."}, {"name": "Sequoia", "state": "California", "lat": 36.43, "lng": -118.68, "img": "https://www.nps.gov/common/uploads/structured_data/3C7A250B-1DD8-B71B-0BCF61A89A8B2970.jpg", "attractions": [{"name": "General Sherman Tree — World's Largest Living Thing", "desc": "Stand at the base of the largest known living tree by volume — 274 feet tall, 36 feet in diameter, containing enough wood to build 40 average homes.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A2835-1DD8-B71B-0B468E834049FBE4.jpg"}, {"name": "Moro Rock Staircase Views", "desc": "Climb 350 steps carved into a granite dome for a 360° panorama over the Great Western Divide — one of the most sweeping views in the Sierra Nevada.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A2E1B-1DD8-B71B-0B4D563CB47FA60F.jpg"}, {"name": "Crystal Cave Marble Tour", "desc": "Tour an 80,000-year-old marble cave decorated with stalactites, stalagmites, and flowstone — the only developed cave in the Sierra Nevada.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7A301B-1DD8-B71B-0B8311F9B0AC4F69.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "Wuksachi Lodge and Lodgepole campground book months ahead. The Giants Forest is the heart of the park.", "nearestCity": "Fresno, CA (FAT)", "flightTime": "~6h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly to Fresno (FAT) ~1.5h drive. Combined with Kings Canyon (adjacent). Most route through LAX."}, {"name": "Shenandoah", "state": "Virginia", "lat": 38.53, "lng": -78.35, "img": "https://www.nps.gov/common/uploads/structured_data/3C80B539-1DD8-B71B-0BEAAA4AC31E7D5B.jpg", "attractions": [{"name": "Skyline Drive — 105 Miles of Ridge-Top Views", "desc": "America's most scenic drive traces the Blue Ridge crest for 105 miles with 75 overlooks — the Shenandoah Valley stretching west, the Piedmont east.", "img": "https://www.nps.gov/common/uploads/structured_data/3C80B63B-1DD8-B71B-0BAC3145E329FC99.jpg"}, {"name": "Old Rag Mountain Rock Scramble", "desc": "The most popular hike in the Mid-Atlantic — a 9-mile circuit with a legendary rock scramble through granite boulders with stunning summit views.", "img": "https://www.nps.gov/common/uploads/structured_data/3C80B752-1DD8-B71B-0B0FAB718671DC3E.jpg"}, {"name": "Dark Hollow Falls", "desc": "A short 1.4-mile round-trip to Shenandoah's most visited waterfall — 70 feet of cascading water over greenstone lava flows through a hemlock gorge.", "img": "https://www.nps.gov/common/uploads/structured_data/3C80B867-1DD8-B71B-0B328321E4420769.jpg"}], "bestTime": "Apr – Jun, Sep – Nov", "bestTimeTip": "Peak fall foliage arrives mid-October. Arrive before 9am on fall weekends. Spring wildflowers in April are exceptional.", "nearestCity": "Washington, DC (DCA)", "flightTime": "~1.5h (direct)", "flightCost": "$100–250", "flightNote": "Fly to Washington DC (DCA/IAD) ~1.5h drive west. An easy weekend trip from NYC."}, {"name": "Theodore Roosevelt", "state": "North Dakota", "lat": 46.97, "lng": -103.45, "img": "https://www.nps.gov/common/uploads/structured_data/3C793AD5-1DD8-B71B-0B4A3C1BFA5B4C83.jpg", "attractions": [{"name": "Painted Canyon Badlands Vista", "desc": "The park's most dramatic overlook — layers of multicolored clay badlands sculpted by 65 million years of erosion stretch to the horizon in an utterly alien landscape.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7939C8-1DD8-B71B-0B048D7EC3812DE3.jpg"}, {"name": "Wild Horse & Bison Herd Viewing", "desc": "Drive the 36-mile South Unit loop at dusk to encounter wild horses and free-roaming bison in their native Great Plains habitat.", "img": "https://www.nps.gov/common/uploads/structured_data/3C793D1D-1DD8-B71B-0B17AA76AF7AE453.jpg"}, {"name": "Petrified Forest Loop Trail", "desc": "Hike through a badlands dreamscape of brightly colored buttes and knobs to a petrified forest — watching prairie dog towns, feral horses, and long-horned cattle.", "img": "https://www.nps.gov/common/uploads/structured_data/3C794347-1DD8-B71B-0B5EB10134348DE1.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "One of the most underrated parks in America. Wild horse sightings are common — dawn and dusk drives are best. Very few crowds even in peak summer.", "nearestCity": "Bismarck, ND (BIS)", "flightTime": "~4h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly to Bismarck (BIS) ~1.5h drive west, or Dickinson (DIK) very close to the park."}, {"name": "Virgin Islands", "state": "U.S. Virgin Islands", "lat": 18.33, "lng": -64.73, "img": "https://www.nps.gov/common/uploads/structured_data/1F0534AF-91EB-443B-41760F790BE42778.jpg", "attractions": [{"name": "Trunk Bay Underwater Snorkel Trail", "desc": "A guided underwater trail with labeled coral formations — the most educational snorkel experience in the Caribbean in crystal-clear water above stunning coral gardens.", "img": "https://www.nps.gov/common/uploads/structured_data/3C79CEF6-1DD8-B71B-0BE2B171E1C38905.jpg"}, {"name": "Annaberg Sugar Mill Ruins", "desc": "Well-preserved 18th-century sugar plantation ruins on a hillside overlooking the British Virgin Islands — a poignant window into the colonial Caribbean past above turquoise water.", "img": "https://www.nps.gov/common/uploads/structured_data/1F2D548F-E180-9786-F4EA73BBE299B47F.jpg"}, {"name": "Reef Bay Trail Petroglyphs", "desc": "A 2.2-mile descent through dry tropical forest leads to ancient Taino petroglyphs — among the most mysterious pre-Columbian carvings in the Caribbean.", "img": "https://www.nps.gov/common/uploads/structured_data/3C79D033-1DD8-B71B-0B99DCE07EFF9D58.jpg"}], "bestTime": "Dec – Apr", "bestTimeTip": "Avoid hurricane season (June–November). January–April offers perfect weather and calm seas for snorkeling. The park covers about 60% of St. John.", "nearestCity": "St. Thomas, VI (STT)", "flightTime": "~4h (direct)", "flightCost": "$250–550", "flightNote": "Fly to St. Thomas (STT) then take a 20-min ferry to Cruz Bay on St. John."}, {"name": "Voyageurs", "state": "Minnesota", "lat": 48.48, "lng": -92.84, "img": "https://www.nps.gov/common/uploads/structured_data/3C8405EF-1DD8-B71B-0B42909E4E77E144.jpg", "attractions": [{"name": "Houseboat Camping on Kabetogama Lake", "desc": "Rent a houseboat and spend nights anchored in a pristine wilderness lake — the most quintessential Voyageurs experience, with no roads, only waterways.", "img": "https://www.nps.gov/common/uploads/structured_data/3C840728-1DD8-B71B-0BBDF500911CBD12.jpg"}, {"name": "Northern Lights Viewing", "desc": "One of the best places in the contiguous US to see the Aurora Borealis — on clear nights from September to March, the lights dance over dark boreal wilderness lakes.", "img": "https://www.nps.gov/common/uploads/structured_data/C44E1879-9C3A-8F39-26AEBBEBB74FAD37.jpeg"}, {"name": "Canoe the Boundary Waters", "desc": "Paddle a 218,000-acre waterway by kayak or canoe — camping on granite islands, spotting loons, otters, and eagles in a primeval boreal wilderness.", "img": "https://www.nps.gov/common/uploads/structured_data/3C840875-1DD8-B71B-0B2416D8B710421E.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "Accessible only by watercraft — rent a boat or take a water taxi. The park is magical on a still August evening.", "nearestCity": "International Falls, MN (INL)", "flightTime": "~5h (1–2 stops)", "flightCost": "$300–600", "flightNote": "Fly to International Falls (INL) via Minneapolis (MSP). Multiple connections required from NYC."}, {"name": "White Sands", "state": "New Mexico", "lat": 32.78, "lng": -106.17, "img": "https://www.nps.gov/common/uploads/structured_data/7CA16410-A412-1F05-2D92EB04EEB27980.jpg", "attractions": [{"name": "Sledding on Gypsum Dunes", "desc": "Rent a sled from the visitor center and rocket down pristine white gypsum dunes — one of the most joyful and uniquely American outdoor experiences you'll ever have.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7FE53E-1DD8-B71B-0BE4AEBECAB602AD.jpg"}, {"name": "Interdune Boardwalk at Sunset", "desc": "Stroll through the surreal white dune field at golden hour — the setting sun turns the dunes shades of pink, apricot, and violet in a landscape unlike anywhere else on Earth.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7FE691-1DD8-B71B-0B21F94DBD31A965.jpg"}, {"name": "Full Moon Night Hike", "desc": "Ranger-guided full moon hikes into the dune field — white sand glowing blue-silver under the full moon in complete silence.", "img": "https://www.nps.gov/common/uploads/structured_data/3C819076-1DD8-B71B-0BBCE3AA4AF4D2CD.jpg"}], "bestTime": "Oct – Apr", "bestTimeTip": "Summer is very hot and the park closes periodically for missile testing. Sunrise and sunset are extraordinary.", "nearestCity": "El Paso, TX (ELP)", "flightTime": "~4h (1 stop)", "flightCost": "$200–420", "flightNote": "Fly to El Paso (ELP) ~90 min drive northeast. Combine with Carlsbad Caverns (2.5h drive)."}, {"name": "Wind Cave", "state": "South Dakota", "lat": 43.57, "lng": -103.48, "img": "https://www.nps.gov/common/uploads/structured_data/3C7ACD12-1DD8-B71B-0BEF13804E4498FF.jpg", "attractions": [{"name": "Boxwork Cave Formations — Unique to Wind Cave", "desc": "Wind Cave contains 95% of the world's known boxwork formations — delicate honeycomb lattices of calcite fins projecting from cave walls found nowhere else on Earth.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7ACE71-1DD8-B71B-0BBD14BFE8C0C468.jpg"}, {"name": "Natural Entrance Tour — The Breathing Cave", "desc": "The cave actually exhales — air rushes in and out as pressure changes, the phenomenon that helped the Lakota Sioux discover the cave in the 19th century.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7ACFE9-1DD8-B71B-0BA11E8BB9A0EE0D.jpg"}, {"name": "Bison & Prairie Dog Surface Wildlife", "desc": "Above the cave, free-roaming bison, pronghorn, coyotes, and one of the largest black-tailed prairie dog towns in the Black Hills.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AD1AD-1DD8-B71B-0B7C9E1C79DA6F5C.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "Cave maintains 53°F year-round. Often combined with Custer State Park, Badlands, and Mount Rushmore for a Black Hills road trip.", "nearestCity": "Rapid City, SD (RAP)", "flightTime": "~4–5h (1 stop)", "flightCost": "$200–450", "flightNote": "Fly to Rapid City (RAP) ~1h drive south."}, {"name": "Wrangell-St. Elias", "state": "Alaska", "lat": 61.71, "lng": -142.99, "img": "https://www.nps.gov/common/uploads/structured_data/3C7AAD63-1DD8-B71B-0BCE10FFD741A687.jpg", "attractions": [{"name": "Kennecott Mines National Historic Landmark", "desc": "Explore a remarkably intact early 20th-century copper mining town frozen in time at the foot of massive glaciers — the most profitable copper mine in history.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AAC04-1DD8-B71B-0B6534785C41D6B5.jpg"}, {"name": "Root Glacier Hike & Ice Climbing", "desc": "Walk across the Root Glacier from Kennecott with crampons provided — see turquoise meltwater pools and crevasses in the largest national park in the US.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AB124-1DD8-B71B-0B224A3B96A7304E.jpg"}, {"name": "Nabesna Road 4WD Wilderness Drive", "desc": "A 42-mile dirt road penetrating the remote Wrangell Mountains past volcanic peaks, braided rivers, and extraordinary wildlife — moose, bears, wolves, and Dall sheep.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7AB2FD-1DD8-B71B-0BC380F8D220B0BA.jpg"}], "bestTime": "Jun – Sep", "bestTimeTip": "Larger than six Yellowstones combined. Kennecott is accessible by a 60-mile dirt road from McCarthy. Budget at least 4–5 days.", "nearestCity": "Anchorage, AK (ANC)", "flightTime": "~8h (1 stop)", "flightCost": "$450–900", "flightNote": "Fly to Anchorage (ANC) then drive ~7h or fly to McCarthy (~1h charter)."}, {"name": "Yellowstone", "state": "Wyoming/Montana/Idaho", "lat": 44.43, "lng": -110.59, "img": "https://www.nps.gov/common/uploads/structured_data/3C7D5920-1DD8-B71B-0B83F012ED802CEA.jpg", "attractions": [{"name": "Old Faithful & Upper Geyser Basin", "desc": "Watch Old Faithful erupt every 90 minutes, then walk the Upper Geyser Basin — the highest concentration of geysers on Earth, with dozens of features erupting in a single 3-mile loop.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7D2FBB-1DD8-B71B-0BED99731011CFCE.jpg"}, {"name": "Grand Prismatic Spring Aerial View", "desc": "Hike the Fairy Falls trail for an overlook of the world's third-largest hot spring — a 370-foot diameter jewel of deep blue, turquoise, gold, and orange rings.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7D383B-1DD8-B71B-0BEC4A4D6BDF7CAD.jpg"}, {"name": "Grand Canyon of the Yellowstone", "desc": "Stand at Artist Point and look down 308 feet of Lower Falls plunging into a canyon of yellow and orange rhyolite — the most photographed view in Yellowstone.", "img": "https://www.nps.gov/common/uploads/structured_data/3C7D334F-1DD8-B71B-0B108C7771F4E854.jpg"}], "bestTime": "May – Sep", "bestTimeTip": "Book accommodations 6–12 months ahead for summer. September elk rut, golden aspens, and cooler temperatures are extraordinary.", "nearestCity": "Jackson Hole, WY (JAC)", "flightTime": "~6h (1 stop)", "flightCost": "$350–700", "flightNote": "Fly to Jackson (JAC) ~1h drive north or Bozeman (BZN) ~1.5h drive south. Book far in advance."}, {"name": "Yosemite", "state": "California", "lat": 37.83, "lng": -119.5, "img": "https://www.nps.gov/common/uploads/structured_data/3C84CC4C-1DD8-B71B-0BE967E5E5D93F25.jpg", "attractions": [{"name": "Yosemite Valley — El Capitan & Half Dome", "desc": "The 3,000-foot granite walls of El Capitan and the iconic rounded profile of Half Dome are the defining images of American wilderness — stunning at any time of day.", "img": "https://www.nps.gov/common/uploads/structured_data/05383E91-AA28-2DDC-AB517507594F9FA6.jpg"}, {"name": "Yosemite Falls — Tallest in North America", "desc": "Watch North America's tallest waterfall (2,425 ft) in its full spring glory — the roar is audible from a mile away and the mist creates rainbows in morning light.", "img": "https://www.nps.gov/common/uploads/structured_data/3C84C6CF-1DD8-B71B-0B1C7CB883AA8FB1.jpg"}, {"name": "Glacier Point Panorama at Sunset", "desc": "Reached by road or trail, Glacier Point delivers a jaw-dropping panorama of Yosemite Valley 3,200 feet below, with Half Dome and the entire High Sierra as backdrop.", "img": "https://www.nps.gov/common/uploads/structured_data/3C84C3C0-1DD8-B71B-0BFF90B64283C3D8.jpg"}], "bestTime": "Apr – Jun, Sep – Oct", "bestTimeTip": "Timed entry reservations required spring–fall. May offers maximum waterfalls and wildflowers. Fall is uncrowded with golden oak color.", "nearestCity": "Fresno, CA (FAT)", "flightTime": "~6h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly to Fresno (FAT) ~1.5h drive, or San Francisco (SFO) ~3.5h drive."}, {"name": "Zion", "state": "Utah", "lat": 37.3, "lng": -113.05, "img": "https://www.nps.gov/common/uploads/structured_data/68BFC1AC-BF96-629F-89D261D78F181C64.jpg", "attractions": [{"name": "The Narrows — Wade a River Through a Slot Canyon", "desc": "Hike upstream through the Virgin River in a 2,000-foot deep slot canyon — the walls so close you can touch both sides, and the sky a thin strip of blue directly above.", "img": "https://www.nps.gov/common/uploads/structured_data/69162F54-D4AF-8695-A42F97A8F9774C19.jpg"}, {"name": "Angels Landing — Most Thrilling Hike in America", "desc": "Ascend 1,488 feet via steep switchbacks and chain-gripped cliffs to a narrow summit perch with sheer 1,500-foot drops on both sides — permit lottery required.", "img": "https://www.nps.gov/common/uploads/structured_data/68D46E7D-A116-A443-ABA04AD1DD785208.jpg"}, {"name": "Emerald Pools & Weeping Rock Trails", "desc": "Easy family hikes beneath hanging gardens of maidenhair fern and wildflowers dripping from canyon walls — a lush desert oasis in the canyon.", "img": "https://www.nps.gov/common/uploads/structured_data/68ED8C2C-A9D3-90B2-BBC96E7A21BC3744.jpg"}], "bestTime": "Mar – May, Sep – Nov", "bestTimeTip": "Summer is crowded with 5,000 cars/day — timed entry permits required. March and April see spring wildflowers and flowing waterfalls.", "nearestCity": "St. George, UT (SGU)", "flightTime": "~5–6h (1 stop)", "flightCost": "$250–500", "flightNote": "Fly to Las Vegas (LAS) ~2.5h drive northeast. Direct NYC to Las Vegas flights available."}, {"name": "American Samoa", "state": "American Samoa", "lat": -14.25, "lng": -170.68, "img": "https://www.nps.gov/common/uploads/structured_data/3C84F643-1DD8-B71B-0BC6F3EA2E1F58AB.jpg", "attractions": [{"name": "Ofu Beach & Coral Reef", "desc": "One of the most pristine coral reef ecosystems in the US — untouched by mass tourism and home to 950+ species of fish just feet from a perfect white sand beach.", "img": "https://www.nps.gov/common/uploads/structured_data/3C84F785-1DD8-B71B-0B93723B92528909.jpg"}, {"name": "Mount Alava Ridge Trail & Flying Foxes", "desc": "Hike to panoramic coastal views through dense tropical rainforest where enormous Samoan flying foxes roost at dusk in the canopy.", "img": "https://www.nps.gov/common/uploads/structured_data/3C84F8DB-1DD8-B71B-0BD434E17818331B.jpg"}, {"name": "Vatia Village Snorkeling", "desc": "Snorkel a remote lagoon near Vatia village — pristine coral gardens with sea turtles, reef sharks, and tropical fish in water with 60+ feet of visibility.", "img": "https://www.nps.gov/common/uploads/structured_data/3C84FA18-1DD8-B71B-0BD1AEF488A50F9F.jpg"}], "bestTime": "May – Oct", "bestTimeTip": "Very difficult to access — expensive flights via Hawaii, limited lodging. Worth it for true off-the-beaten-path adventurers.", "nearestCity": "Pago Pago, AS (PPG)", "flightTime": "~14h (2 stops)", "flightCost": "$800–1,500", "flightNote": "Fly NYC to Honolulu (HNL) then to Pago Pago (PPG). Inter-island ferries reach Ofu Island."}];

// ── THEME ──
(function(){
  const btn = document.getElementById('theme-toggle');
  const html = document.documentElement;
  let d = 'dark';
  html.setAttribute('data-theme', d);
  function updateIcon(){
    btn.innerHTML = d==='dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.setAttribute('aria-label', 'Switch to '+(d==='dark'?'light':'dark')+' mode');
  }
  updateIcon();
  btn.addEventListener('click', ()=>{
    d = d==='dark'?'light':'dark';
    html.setAttribute('data-theme',d);
    updateIcon();
  });
})();

// ── MAP INIT ──
const map = L.map('map', {
  center: [39.5, -98.35],
  zoom: 4,
  zoomControl: true,
  minZoom: 3,
  maxZoom: 15,
  attributionControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  maxZoom:19, subdomains:'abcd'
}).addTo(map);

L.control.attribution({position:'bottomleft'}).addTo(map);
map.attributionControl.addAttribution('© <a href="https://carto.com" target="_blank">CARTO</a> | NPS');

// ── HOVER CARD ──
const hoverCard  = document.getElementById('hover-card');
const hcImg      = document.getElementById('hc-img');
const hcLabel    = document.getElementById('hc-label');
const mapEl      = document.getElementById('map-container');
let hideTimer    = null;

function showHoverCard(park, containerPoint) {
  clearTimeout(hideTimer);
  hcImg.src   = park.img;
  hcImg.alt   = park.name;
  hcLabel.textContent = park.name;

  const CARD_W = 222, CARD_H = 195, OFFSET = 14;
  const mw = mapEl.offsetWidth, mh = mapEl.offsetHeight;
  const px = containerPoint.x, py = containerPoint.y;

  // decide horizontal: default left-of-pin; flip to right if too close to left edge
  let left = px - CARD_W - OFFSET;
  if (left < 4) left = px + OFFSET;

  // decide vertical: default above pin; flip below if too close to top
  let top = py - CARD_H - OFFSET;
  if (top < 4) top = py + OFFSET;

  hoverCard.style.left = left + 'px';
  hoverCard.style.top  = top  + 'px';
  hoverCard.style.opacity = '1';
}

function hideHoverCard() {
  hoverCard.style.opacity = '0';
}

// ── SIDEBAR ──
const sidebar       = document.getElementById('sidebar');
const sbName        = document.getElementById('sidebar-park-name');
const sbState       = document.getElementById('sidebar-state');
const sbHero        = document.getElementById('sb-hero');
const attractionsList = document.getElementById('attractions-list');
const bestTimeChip  = document.getElementById('best-time-chip');
const bestTimeTip   = document.getElementById('best-time-tip');
const flightCard    = document.getElementById('flight-card');
const closeBtn      = document.getElementById('close-btn');

function openSidebar(park) {
  sbName.textContent  = park.name;
  sbState.textContent = park.state;
  sbHero.src          = park.img;
  sbHero.alt          = park.name + ' hero image';

  // Attractions
  attractionsList.innerHTML = park.attractions.map((a,i)=>`
    <div class="attraction">
      <div class="attraction-num">${i+1}</div>
      <div class="attraction-body">
        <div class="attraction-name">${a.name}</div>
        <div class="attraction-desc">${a.desc}</div>
        <img class="attraction-img" src="${a.img}" alt="${a.name}" width="300" height="90" loading="lazy">
      </div>
    </div>
  `).join('');

  // Best time
  bestTimeChip.innerHTML = `
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    ${park.bestTime}
  `;
  bestTimeTip.textContent = park.bestTimeTip;

  // Flight
  flightCard.innerHTML = `
    <div class="flight-field">
      <div class="flight-label">Nearest Airport</div>
      <div class="flight-val">${park.nearestCity}</div>
    </div>
    <div class="flight-field">
      <div class="flight-label">Flight Time</div>
      <div class="flight-val">${park.flightTime}</div>
    </div>
    <div class="flight-field" style="grid-column:1/-1">
      <div class="flight-label">Typical Cost (Round-Trip)</div>
      <div class="flight-val">${park.flightCost}</div>
    </div>
    <div class="flight-note">${park.flightNote}</div>
  `;

  sidebar.classList.add('open');
  document.getElementById('sidebar-scroll').scrollTop = 0;
}

closeBtn.addEventListener('click', ()=>{ sidebar.classList.remove('open'); });

// ── CUSTOM SVG PIN ICON ──
function makePinIcon(color='#01696f') {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 36" class="park-marker">
    <filter id="dropshadow" x="-40%" y="-20%" width="180%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35"/>
    </filter>
    <path class="pin-body" d="M14 1C7.925 1 3 5.925 3 12c0 7.5 11 23 11 23S25 19.5 25 12C25 5.925 20.075 1 14 1z"
      fill="${color}" filter="url(#dropshadow)"/>
    <circle cx="14" cy="12" r="4.5" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    tooltipAnchor: [0, -38],
  });
}

// ── ADD MARKERS ──
const SKIP = ['American Samoa', 'Virgin Islands'];

PARKS.forEach(park => {
  if (SKIP.includes(park.name)) return;

  const marker = L.marker([park.lat, park.lng], { icon: makePinIcon('#01696f') })
    .addTo(map)
    .bindTooltip(park.name, { className: 'park-tooltip', direction: 'top', offset: [0, -10], permanent: false });

  marker.on('mouseover', function(e){
    const cp = map.latLngToContainerPoint(e.latlng);
    showHoverCard(park, cp);
  });
  marker.on('mouseout', function(){
    hideTimer = setTimeout(hideHoverCard, 200);
  });
  marker.on('click', function(){
    openSidebar(park);
    hideHoverCard();
    map.panTo([park.lat, park.lng], { animate: true, duration: 0.5 });
  });
});

// Add remote parks separately with a different color note
const remoteParks = PARKS.filter(p => SKIP.includes(p.name));
remoteParks.forEach(park => {
  const marker = L.marker([park.lat, park.lng], { icon: makePinIcon('#964219') })
    .addTo(map)
    .bindTooltip(park.name + ' (off-screen)', { className: 'park-tooltip', direction: 'top', permanent: false });
  marker.on('click', ()=>{ openSidebar(park); hideHoverCard(); });
});
</script>
